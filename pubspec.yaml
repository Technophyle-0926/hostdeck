name: hostdeck
description: "Manage and monitor multiple AppHost accounts seamlessly with HostDeck"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  intl: ^0.20.3
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  package_rename_plus: ^1.11.0

flutter:
  uses-material-design: true
