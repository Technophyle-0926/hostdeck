  share_plus: ^13.2.0
  local_auth: ^3.0.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  encrypt: ^5.0.3
  sign_in_button: ^5.0.0
  crypto: ^3.0.7
  mobile_scanner: ^7.2.0
