name: hostdeck
description: "Manage and monitor multiple AppHost accounts seamlessly with HostDeck"
publish_to: 'none'

version: 1.3.1+6

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  get: ^4.7.3
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  intl: ^0.20.3
